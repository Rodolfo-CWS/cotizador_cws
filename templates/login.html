<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWS Cotizador - Iniciar Sesión</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #f5f4f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .login-container .logo {
            margin-bottom: 32px;
        }

        .login-container .logo img {
            max-height: 80px;
            max-width: 220px;
            object-fit: contain;
        }

        .login-container h1 {
            font-size: 22px;
            color: #1e293b;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .login-container .subtitle {
            color: #78716c;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d6d3d1;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            background: #faf9f7;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: white;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #4338ca;
        }

        .btn-login:disabled {
            background: #a8a29e;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: left;
        }

        .success-message {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #16a34a;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .register-link {
            margin-top: 24px;
            font-size: 14px;
            color: #78716c;
        }

        .register-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: block;
            margin-top: 16px;
            font-size: 13px;
            color: #78716c;
            text-decoration: none;
        }

        .back-link:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/logo.png" alt="CWS Cotizador">
        </div>
        <h1>Iniciar Sesión</h1>
        <p class="subtitle">Ingresa con tu email y contraseña</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form id="loginForm" method="POST" action="/auth/login">
            <div class="form-group">
                <label for="email">Email</label>
                <input
                    type="email"
                    name="email"
                    id="email"
                    placeholder="tu@email.com"
                    required
                    autofocus
                >
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Tu contraseña"
                    required
                    minlength="8"
                >
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Iniciar Sesión
            </button>
        </form>

        <p class="register-link">
            ¿No tienes cuenta?
            <a href="/auth/register">Crear una cuenta</a>
        </p>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const btnLogin = document.getElementById('btnLogin');

        form.addEventListener('submit', function() {
            btnLogin.disabled = true;
            btnLogin.textContent = 'Iniciando sesión...';
        });
    </script>
</body>
</html>
