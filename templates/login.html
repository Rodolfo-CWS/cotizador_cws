<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWS - Iniciar Sesión</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* Estilos específicos de la página de login */
        body {
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 24px;
        }

        label {
            margin-bottom: 12px;
            font-size: 16px;
        }

        @media (max-width: 600px) {
            .login-container {
                padding: 32px 24px;
            }

            .login-container .logo {
                margin-bottom: 32px;
            }

            .login-container .logo img {
                max-height: 90px;
                max-width: 230px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <img src="/static/logo.png" alt="CWS Company">
        </div>
        <h1>CWS Sistema de Cotizaciones</h1>

        <form id="loginForm" method="POST" action="/login">
            <div class="form-group">
                <label for="vendedor">¿Quién eres?</label>
                <select name="vendedor" id="vendedor" class="login-select" required>
                    <option value="" disabled selected>Selecciona tu nombre...</option>
                    <option value="Rodolfo Moreno">Rodolfo Moreno</option>
                    <option value="Francisco Moreno">Francisco Moreno</option>
                    <option value="Anuar Bazan">Anuar Bazan</option>
                    <option value="Armando Castillo">Armando Castillo</option>
                    <option value="Santiago Vazquez">Santiago Vazquez</option>
                </select>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                Iniciar Sesión
            </button>

            <div id="mensaje" class="message"></div>
        </form>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const selectVendedor = document.getElementById('vendedor');
        const btnLogin = document.getElementById('btnLogin');
        const mensaje = document.getElementById('mensaje');

        // Auto-submit cuando se selecciona un vendedor
        selectVendedor.addEventListener('change', function() {
            if (this.value) {
                btnLogin.disabled = false;
            }
        });

        // Manejar el envío del formulario
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const vendedor = selectVendedor.value;

            if (!vendedor) {
                mostrarMensaje('Por favor selecciona tu nombre', 'error');
                return;
            }

            // Deshabilitar botón y select durante el proceso
            btnLogin.disabled = true;
            selectVendedor.disabled = true;
            btnLogin.textContent = 'Iniciando sesión...';

            // Enviar formulario
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `vendedor=${encodeURIComponent(vendedor)}`
            })
            .then(response => {
                if (response.ok) {
                    mostrarMensaje('¡Bienvenido! Redirigiendo...', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 500);
                } else {
                    throw new Error('Error al iniciar sesión');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                mostrarMensaje('Error al iniciar sesión. Intenta de nuevo.', 'error');
                btnLogin.disabled = false;
                selectVendedor.disabled = false;
                btnLogin.textContent = 'Iniciar Sesión';
            });
        });

        function mostrarMensaje(texto, tipo) {
            mensaje.textContent = texto;
            mensaje.className = 'message ' + tipo;
        }

        // Auto-focus en el select al cargar
        document.addEventListener('DOMContentLoaded', function() {
            selectVendedor.focus();
        });
    </script>
</body>
</html>
