<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWS Cotizador - Crear Cuenta</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background: #f5f4f1;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        .register-container {
            background: white;
            border-radius: 12px;
            padding: 48px 40px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .register-container .logo {
            margin-bottom: 24px;
        }

        .register-container .logo img {
            max-height: 60px;
            max-width: 180px;
            object-fit: contain;
        }

        .register-container h1 {
            font-size: 22px;
            color: #1e293b;
            margin: 0 0 8px 0;
            font-weight: 600;
        }

        .register-container .subtitle {
            color: #78716c;
            font-size: 14px;
            margin-bottom: 28px;
        }

        .form-section {
            text-align: left;
            margin-bottom: 24px;
        }

        .form-section h2 {
            font-size: 14px;
            color: #4f46e5;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin: 0 0 12px 0;
            padding-bottom: 8px;
            border-bottom: 1px solid #e7e5e4;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid #d6d3d1;
            border-radius: 8px;
            font-size: 15px;
            color: #1e293b;
            background: #faf9f7;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-sizing: border-box;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: white;
        }

        .form-group .hint {
            font-size: 12px;
            color: #78716c;
            margin-top: 4px;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-register:hover {
            background: #4338ca;
        }

        .btn-register:disabled {
            background: #a8a29e;
            cursor: not-allowed;
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: left;
        }

        .login-link {
            margin-top: 24px;
            font-size: 14px;
            color: #78716c;
        }

        .login-link a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1 style="font-size:28px;color:#4f46e5;">Cotizador</h1>
        <p class="subtitle">Crea tu cuenta y empieza a cotizar</p>

        {% if error %}
        <div class="error-message">{{ error }}</div>
        {% endif %}

        <form id="registerForm" method="POST" action="/auth/register">
            <!-- Datos del usuario -->
            <div class="form-section">
                <h2>Tus datos</h2>

                <div class="form-group">
                    <label for="full_name">Nombre completo</label>
                    <input
                        type="text"
                        name="full_name"
                        id="full_name"
                        placeholder="Tu nombre"
                        required
                        autofocus
                    >
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        name="email"
                        id="email"
                        placeholder="tu@email.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div style="position:relative;display:flex;align-items:center;">
                        <input
                            type="password"
                            name="password"
                            id="password"
                            placeholder="Mínimo 8 caracteres"
                            required
                            minlength="8"
                            style="padding-right:40px;"
                        >
                        <button type="button" id="togglePass" style="position:absolute;right:4px;background:none;border:none;cursor:pointer;padding:8px;" tabindex="-1">
                            <svg id="eyeClosed" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#78716c" stroke-width="1.5">
                                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
                            </svg>
                            <svg id="eyeOpen" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#78716c" stroke-width="1.5" style="display:none">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Datos de la empresa -->
            <div class="form-section">
                <h2>Tu empresa</h2>

                <div class="form-group">
                    <label for="company_name">Nombre de la empresa</label>
                    <input
                        type="text"
                        name="company_name"
                        id="company_name"
                        placeholder="Ej: Industrias ACME SA de CV"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="company_slug">Identificador único</label>
                    <input
                        type="text"
                        name="company_slug"
                        id="company_slug"
                        placeholder="Ej: industrias-acme"
                        required
                        pattern="[a-z0-9-]+"
                    >
                    <p class="hint">Solo minúsculas, números y guiones. Se usa en la URL de tu cuenta.</p>
                </div>
            </div>

            <button type="submit" class="btn-register" id="btnRegister">
                Crear Cuenta
            </button>
        </form>

        <p class="login-link">
            ¿Ya tienes cuenta?
            <a href="/auth/login">Iniciar Sesión</a>
        </p>
    </div>

    <script>
        // Toggle password visibility
        document.getElementById('togglePass').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            const closed = document.getElementById('eyeClosed');
            const open = document.getElementById('eyeOpen');
            if (pwd.type === 'password') {
                pwd.type = 'text'; closed.style.display = 'none'; open.style.display = 'block';
            } else {
                pwd.type = 'password'; closed.style.display = 'block'; open.style.display = 'none';
            }
        });

        const form = document.getElementById('registerForm');
        const btnRegister = document.getElementById('btnRegister');
        const slugInput = document.getElementById('company_slug');

        // Auto-generar slug desde el nombre de la empresa
        document.getElementById('company_name').addEventListener('input', function() {
            if (!slugInput.dataset.manual) {
                slugInput.value = this.value
                    .toLowerCase()
                    .replace(/[^a-z0-9\s-]/g, '')
                    .replace(/\s+/g, '-')
                    .replace(/-+/g, '-')
                    .replace(/^-|-$/g, '');
            }
        });

        // Marcar slug como editado manualmente si el usuario lo modifica
        slugInput.addEventListener('input', function() {
            this.dataset.manual = 'true';
        });

        form.addEventListener('submit', function() {
            btnRegister.disabled = true;
            btnRegister.textContent = 'Creando cuenta...';
        });
    </script>
</body>
</html>
