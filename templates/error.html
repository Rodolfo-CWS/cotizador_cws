<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error</title>
    <style>
        body { background: #f5f4f1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .card { background: white; border-radius: 12px; padding: 48px; max-width: 420px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-size: 48px; color: #dc2626; margin: 0; }
        p { color: #44403c; font-size: 15px; margin: 16px 0 24px 0; }
        a { display: inline-block; padding: 10px 24px; background: #4f46e5; color: white; text-decoration: none; border-radius: 8px; font-size: 14px; }
        a:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Oops</h1>
        <p>{{ error or 'Algo salio mal. Intenta de nuevo.' }}</p>
        <a href="/">Volver al inicio</a>
    </div>
</body>
</html>
