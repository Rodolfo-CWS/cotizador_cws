<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        body { background: #f5f4f1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
        p { color: #78716c; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px 14px; border: 1.5px solid #d6d3d1; border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        button:disabled { background: #a8a29e; cursor: not-allowed; }
        .message { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        #loading { color: #78716c; font-size: 14px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nueva Contraseña</h1>
        <p>Elige una contraseña nueva para tu cuenta.</p>

        <div id="loading">Verificando enlace...</div>
        <div id="error" class="error"></div>
        <div id="message" class="message"></div>

        <form id="resetForm" style="display:none">
            <input type="password" id="password" placeholder="Nueva contraseña" required minlength="8" autocomplete="new-password">
            <button type="submit" id="btnSubmit">Cambiar Contraseña</button>
        </form>
    </div>

    <script>
        (async function() {
            const SUPABASE_URL = 'https://udnlhvmmmyrtrwuahbxh.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbmxodm1tbXlydHJ3dWFoYnhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU4ODcxNTIsImV4cCI6MjA3MTQ2MzE1Mn0.aWXnflhpVnOxtYunyDTa9ZSYVKKw8bNlyJuLUTgEwyk';

            const errorEl = document.getElementById('error');
            const messageEl = document.getElementById('message');
            const loadingEl = document.getElementById('loading');
            const form = document.getElementById('resetForm');
            const btn = document.getElementById('btnSubmit');
            const passwordInput = document.getElementById('password');

            // Verificar que supabase JS cargó
            if (typeof supabase === 'undefined' || !supabase.createClient) {
                loadingEl.style.display = 'none';
                errorEl.textContent = 'Error al cargar la librería. Intenta de nuevo o solicita otro enlace.';
                errorEl.style.display = 'block';
                return;
            }

            const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // Verificar sesión del enlace de recuperación
            const { data: { session }, error: sessionError } = await sb.auth.getSession();

            if (sessionError || !session) {
                loadingEl.style.display = 'none';
                errorEl.textContent = sessionError?.message || 'El enlace de recuperación expiró o no es válido. Solicita uno nuevo.';
                errorEl.style.display = 'block';
                return;
            }

            // Sesión válida: mostrar formulario
            loadingEl.style.display = 'none';
            form.style.display = 'block';
            passwordInput.focus();

            // Manejar submit
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                btn.disabled = true;
                btn.textContent = 'Cambiando...';
                errorEl.style.display = 'none';

                const password = passwordInput.value;
                if (password.length < 8) {
                    errorEl.textContent = 'La contraseña debe tener al menos 8 caracteres';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Cambiar Contraseña';
                    return;
                }

                const { error } = await sb.auth.updateUser({ password });

                if (error) {
                    errorEl.textContent = error.message;
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Cambiar Contraseña';
                } else {
                    messageEl.textContent = 'Contraseña actualizada! Redirigiendo al login...';
                    messageEl.style.display = 'block';
                    form.style.display = 'none';

                    // Cerrar sesión para forzar login fresco
                    await sb.auth.signOut();
                    setTimeout(function() { window.location.href = '/auth/login'; }, 2000);
                }
            });
        })();
    </script>
</body>
</html>
