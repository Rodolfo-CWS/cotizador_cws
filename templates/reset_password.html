<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Contraseña</title>
    <style>
        body { background: #f5f4f1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
        p { color: #78716c; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px 14px; border: 1.5px solid #d6d3d1; border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        button:disabled { background: #a8a29e; cursor: not-allowed; }
        .message { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nueva Contraseña</h1>
        <p>Elige una contraseña nueva para tu cuenta.</p>

        <div id="error" class="error"></div>
        <div id="message" class="message"></div>

        <form id="resetForm">
            <input type="password" id="password" placeholder="Nueva contraseña" required minlength="8">
            <button type="submit" id="btnSubmit">Cambiar Contraseña</button>
        </form>
    </div>

    <script type="module">
        // Cargar Supabase JS desde CDN
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://udnlhvmmmyrtrwuahbxh.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVkbmxodm1tbXlydHJ3dWFoYnhoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTU4ODcxNTIsImV4cCI6MjA3MTQ2MzE1Mn0.aWXnflhpVnOxtYunyDTa9ZSYVKKw8bNlyJuLUTgEwyk';

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const errorEl = document.getElementById('error');
        const messageEl = document.getElementById('message');
        const form = document.getElementById('resetForm');
        const btn = document.getElementById('btnSubmit');

        // Verificar que tenemos una sesión (el link de Supabase nos da una automáticamente)
        const { data: { session }, error: sessionError } = await supabase.auth.getSession();

        if (sessionError || !session) {
            errorEl.textContent = 'El enlace de recuperación expiró o no es válido. Solicita uno nuevo.';
            errorEl.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Cambiando...';

            const password = document.getElementById('password').value;

            const { error } = await supabase.auth.updateUser({ password });

            if (error) {
                errorEl.textContent = error.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Cambiar Contraseña';
            } else {
                messageEl.textContent = '¡Contraseña actualizada! Redirigiendo al login...';
                messageEl.style.display = 'block';
                form.style.display = 'none';
                setTimeout(() => {
                    window.location.href = '/auth/login';
                }, 2000);
            }
        });
    </script>
</body>
</html>
