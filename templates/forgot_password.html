<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <style>
        body { background: #f5f4f1; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { background: white; border-radius: 12px; padding: 40px; max-width: 400px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; }
        h1 { font-size: 20px; color: #1e293b; margin-bottom: 8px; }
        p { color: #78716c; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 10px 14px; border: 1.5px solid #d6d3d1; border-radius: 8px; font-size: 15px; box-sizing: border-box; margin-bottom: 12px; }
        input:focus { outline: none; border-color: #4f46e5; }
        button { width: 100%; padding: 12px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; }
        button:hover { background: #4338ca; }
        .message { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        a { color: #4f46e5; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Recuperar Contraseña</h1>
        <p>Ingresa tu email y te enviaremos un enlace para restablecer tu contraseña.</p>

        {% if message %}<div class="message">{{ message }}</div>{% endif %}
        {% if error %}<div class="error">{{ error }}</div>{% endif %}

        <form method="POST">
            <input type="email" name="email" placeholder="tu@email.com" required autofocus>
            <button type="submit">Enviar Enlace</button>
        </form>
        <br>
        <a href="/auth/login">← Volver al login</a>
    </div>
</body>
</html>
