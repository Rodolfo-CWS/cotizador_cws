<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company.name }} - Perfil de Empresa</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body { background: #f5f4f1; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .container { max-width: 640px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 32px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .card h1 { font-size: 20px; color: #1e293b; margin: 0 0 4px 0; }
        .card .subtitle { color: #78716c; font-size: 14px; margin: 0 0 24px 0; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; font-weight: 500; color: #1e293b; margin-bottom: 6px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1.5px solid #d6d3d1; border-radius: 8px; font-size: 14px; color: #1e293b; background: #faf9f7; box-sizing: border-box; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.1); background: white; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .btn-primary { background: #4f46e5; color: white; } .btn-primary:hover { background: #4338ca; }
        .btn-secondary { background: #e7e5e4; color: #44403c; margin-right: 8px; }
        .nav { display: flex; gap: 4px; margin-bottom: 20px; background: white; border-radius: 12px; padding: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .nav a { padding: 10px 16px; border-radius: 8px; font-size: 14px; color: #44403c; text-decoration: none; }
        .nav a.active { background: #4f46e5; color: white; }
        .nav a:hover:not(.active) { background: #f5f4f1; }
        .flash { padding: 10px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .flash-success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #16a34a; }
        .flash-error { background: #fef2f2; border: 1px solid #fecaca; color: #dc2626; }
        .back-link { display: inline-block; color: #4f46e5; text-decoration: none; font-size: 14px; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="/admin/company/profile" class="active">Perfil</a>
            <a href="/admin/company/branding">Branding</a>
            <a href="/admin/company/users">Usuarios</a>
            <a href="/">← Volver</a>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <div class="card">
            <h1>Perfil de Empresa</h1>
            <p class="subtitle">Estos datos aparecen en tus cotizaciones y PDFs</p>

            <form method="POST">
                <div class="form-group">
                    <label>Nombre de la empresa *</label>
                    <input type="text" name="name" value="{{ company.name if company else '' }}" required>
                </div>

                <div class="form-group">
                    <label>RFC / Tax ID</label>
                    <input type="text" name="tax_id" value="{{ company.tax_id if company else '' }}">
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <textarea name="address">{{ company.address if company else '' }}</textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" name="phone" value="{{ company.phone if company else '' }}">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" name="email" value="{{ company.email if company else '' }}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Tasa de IVA (%)</label>
                    <input type="number" name="iva_rate" value="{{ company.iva_rate if company else 16.00 }}" step="0.01" min="0" max="100">
                </div>

                <div class="form-group">
                    <label>Texto del footer (aparece en PDFs)</label>
                    <textarea name="footer_text">{{ company.footer_text if company else '' }}</textarea>
                </div>

                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
            </form>
        </div>
    </div>
</body>
</html>
